<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ATXFC DESK">
<title>ATX Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --verde:  #00b140;
    --verde2: #007d2c;
    --vg:     rgba(0,177,64,0.18);
    --panel:  rgba(4,12,7,0.78);
    --border: rgba(0,177,64,0.22);
    --muted:  rgba(0,177,64,0.38);
    --rain:   #5bc8f5;
    --bg:     #020c05;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--verde);}

  #bg{position:fixed;inset:0;z-index:0;}
  #bg svg{width:100%;height:100%;position:absolute;top:0;left:0;}
  #grain{position:fixed;inset:0;z-index:1;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.055'/%3E%3C/svg%3E");
    opacity:0.4;}

  #app{position:relative;z-index:2;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:env(safe-area-inset-top,16px) env(safe-area-inset-right,16px) env(safe-area-inset-bottom,16px) env(safe-area-inset-left,16px);
    gap:0;}

  /* CLOCK PANEL */
  #clock-panel{
    text-align:center;padding:14px 30px 10px;
    background:var(--panel);border:1px solid var(--border);border-radius:3px;
    backdrop-filter:blur(16px);
    box-shadow:0 0 52px rgba(0,0,0,0.72),0 0 28px rgba(0,177,64,0.05),inset 0 0 24px rgba(0,0,0,0.5);
    width:min(600px,94vw);}

  #badge-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;}
  #badge-row svg{width:28px;height:28px;filter:drop-shadow(0 0 5px rgba(0,177,64,0.5));}
  #badge-label{font-family:'Oswald',sans-serif;font-weight:300;font-size:clamp(8px,1.5vw,11px);letter-spacing:0.35em;color:var(--muted);text-transform:uppercase;}

  #days-row{display:flex;justify-content:center;gap:13px;margin-bottom:6px;
    font-family:'Oswald',sans-serif;font-weight:200;font-size:clamp(8px,1.7vw,12px);letter-spacing:0.22em;color:rgba(0,177,64,0.28);}
  #days-row .ad{color:var(--verde);border-bottom:1px solid var(--verde);padding-bottom:1px;}

  #time-display{font-family:'Share Tech Mono',monospace;font-size:clamp(60px,13vw,108px);letter-spacing:0.04em;line-height:1;color:var(--verde);
    text-shadow:0 0 8px rgba(0,177,64,0.9),0 0 28px rgba(0,177,64,0.4),0 0 72px rgba(0,177,64,0.14);}
  .colon{animation:bc 1s step-end infinite;display:inline-block;width:0.26em;text-align:center;}
  @keyframes bc{0%,100%{opacity:1}50%{opacity:0.1}}

  #date-row{font-family:'Oswald',sans-serif;font-weight:300;font-size:clamp(10px,2vw,14px);letter-spacing:0.28em;color:var(--muted);margin-top:4px;text-transform:uppercase;}
  .hl{color:rgba(0,177,64,0.65);}

  /* WEATHER */
  #wc{width:min(600px,94vw);margin-top:8px;background:var(--panel);border:1px solid var(--border);border-radius:3px;
    backdrop-filter:blur(16px);padding:10px 22px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    box-shadow:0 0 32px rgba(0,0,0,0.55);
    transition:border-color 3s,box-shadow 3s;}
#rain-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
@keyframes twinkle{0%,100%{opacity:0.55}50%{opacity:0.2}}
@keyframes lightning{0%,100%{opacity:0}8%{opacity:0.06}10%{opacity:0}13%{opacity:0.04}15%{opacity:0}}
  #tm{font-family:'Share Tech Mono',monospace;font-size:clamp(36px,7.5vw,60px);color:var(--verde);line-height:1;
    text-shadow:0 0 12px rgba(0,177,64,0.7);}
  #tm sup{font-size:0.38em;vertical-align:top;margin-top:0.25em;}
  #wm{display:flex;flex-direction:column;gap:3px;font-family:'Oswald',sans-serif;font-weight:200;
    font-size:clamp(9px,1.8vw,12px);letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;
    flex:1;padding-left:14px;border-left:1px solid var(--border);}
  #wm .v{color:var(--verde);} #wm .rv{color:var(--rain);}
  #wi{font-size:clamp(26px,5vw,40px);opacity:0.85;filter:drop-shadow(0 0 6px rgba(0,177,64,0.35));}
  #wcd{font-family:'Oswald',sans-serif;font-weight:200;font-size:clamp(8px,1.5vw,11px);letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;text-align:center;margin-top:2px;}

  /* FORECAST */
  #fc{width:min(600px,94vw);margin-top:7px;display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .ft{background:rgba(4,12,7,0.62);border:1px solid rgba(0,177,64,0.1);border-radius:2px;
    backdrop-filter:blur(8px);padding:6px 3px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px;
    transition:border-color 0.2s,box-shadow 0.2s;}
  .ft:hover{border-color:rgba(0,177,64,0.32);}
  .ft.severe{border-color:rgba(180,20,20,0.7);box-shadow:0 0 8px rgba(180,20,20,0.25);}
  #wc.severe{border-color:rgba(180,20,20,0.7);box-shadow:0 0 20px rgba(180,20,20,0.2),0 0 32px rgba(0,0,0,0.55);}
  .fd{font-family:'Oswald',sans-serif;font-weight:300;font-size:clamp(7px,1.4vw,10px);letter-spacing:0.16em;color:var(--muted);text-transform:uppercase;}
  .fi{font-size:clamp(13px,2.4vw,19px);}
  .fh{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,1.9vw,14px);color:var(--verde);text-shadow:0 0 5px rgba(0,177,64,0.55);}
  .fl{font-family:'Share Tech Mono',monospace;font-size:clamp(8px,1.6vw,11px);color:rgba(0,177,64,0.4);}
  .fr{font-family:'Oswald',sans-serif;font-weight:200;font-size:clamp(7px,1.3vw,9px);color:var(--rain);letter-spacing:0.1em;}

  #status{margin-top:6px;font-family:'Oswald',sans-serif;font-weight:200;font-size:clamp(7px,1.2vw,9px);letter-spacing:0.2em;color:rgba(0,177,64,0.16);text-transform:uppercase;}

  #loading{position:fixed;inset:0;z-index:50;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;transition:opacity 0.7s;}
  #loading.fade{opacity:0;pointer-events:none;}
  #ltxt{font-family:'Share Tech Mono',monospace;font-size:12px;color:rgba(0,177,64,0.35);letter-spacing:0.22em;animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}
</style>
</head>

      <span id="badge-label">Verde · Austin FC · ATX</span>

    <!-- Days -->
    <div id="days-row">
      <span id="d-mon">MON</span>
      <span id="d-tue">TUE</span>
      <span id="d-wed">WED</span>
      <span id="d-thu">THU</span>
      <span id="d-fri">FRI</span>
      <span id="d-sat">SAT</span>
      <span id="d-sun">SUN</span>
    </div>

    <!-- Time -->
    <div id="time-display">
      <span id="th">--</span><span class="colon">:</span><span id="tm2">--</span><span class="colon">:</span><span id="ts">--</span>
    </div>

    <!-- Date -->
    <div id="date-row">
      <span id="dmon"></span>&nbsp;<span class="hl" id="ddate"></span>&nbsp;·&nbsp;<span id="dyr"></span>

  <!-- Current weather -->
  <div id="wc">
    <div style="text-align:center;">
      <div id="wi">⛅</div>
      <div id="wcd">LOADING</div>
    </div>
    <div id="tm">--<sup>°F</sup></div>
    <div id="wm">
      <div>HIGH&nbsp;&nbsp;<span class="v" id="wh">--°</span></div>
      <div>LOW&nbsp;&nbsp;&nbsp;<span class="v" id="wl">--°</span></div>
      <div>RAIN&nbsp;&nbsp;<span class="rv" id="wr">--%</span></div>
      <div id="wloc" style="margin-top:3px;font-size:0.82em;opacity:0.52;letter-spacing:0.1em;">LOCATING...</div>
    </div>
  </div>

  <!-- 7-day forecast -->
  <div id="fc"></div>

  <div id="status">OPEN-METEO · WMO · VERDE DESK</div>

</div>

<script>
const DAYS=['d-sun','d-mon','d-tue','d-wed','d-thu','d-fri','d-sat'];
const MON=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const pad=n=>String(n).padStart(2,'0');

function tick(){
  const n=new Date();
  let h=n.getHours()%12||12;
  document.getElementById('th').textContent=pad(h);
  document.getElementById('tm2').textContent=pad(n.getMinutes());
  document.getElementById('ts').textContent=pad(n.getSeconds());
  document.getElementById('dmon').textContent=MON[n.getMonth()];
  document.getElementById('ddate').textContent=pad(n.getDate());
  document.getElementById('dyr').textContent=n.getFullYear();
  DAYS.forEach((id,i)=>document.getElementById(id).classList.toggle('ad',i===n.getDay()));
}
setInterval(tick,1000);tick();

const cF=c=>Math.round(c*9/5+32);
const DAB=['SUN','MON','TUE','WED','THU','FRI','SAT'];

function wIcon(c,night){
  if(c===0)return night?'🌙':'☀️';
  if(c<=2)return night?'🌛':'🌤';
  if(c<=3)return'☁️';
  if(c<=49)return'🌫';
  if(c<=67)return'🌧';
  if(c<=77)return'❄️';
  if(c<=82)return'🌦';
  if(c<=86)return'🌨';
  return'⛈';
}
function wLbl(c){
  if(c===0)return'CLEAR';
  if(c<=2)return'PARTLY CLOUDY';
  if(c<=3)return'OVERCAST';
  if(c<=49)return'FOGGY';
  if(c<=57)return'DRIZZLE';
  if(c<=67)return'RAIN';
  if(c<=77)return'SNOW';
  if(c<=82)return'SHOWERS';
  if(c<=86)return'SNOW SHWRS';
  return'STORM';
}

function loadWx(lat,lon,city){
  document.getElementById('wloc').textContent=city.toUpperCase().slice(0,22);
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=celsius&forecast_days=8&timezone=auto`)
    .then(r=>r.json()).then(d=>{
      const cur=d.current,day=d.daily;
      const night=new Date().getHours()<6||new Date().getHours()>=20;
      document.getElementById('tm').innerHTML=`${cF(cur.temperature_2m)}<sup>°F</sup>`;
      document.getElementById('wi').textContent=wIcon(cur.weathercode,night);
      document.getElementById('wcd').textContent=wLbl(cur.weathercode);
      document.getElementById('wh').textContent=cF(day.temperature_2m_max[0])+'°';
      document.getElementById('wl').textContent=cF(day.temperature_2m_min[0])+'°';
      document.getElementById('wr').textContent=(day.precipitation_probability_max[0]??0)+'%';
      const fc=document.getElementById('fc');fc.innerHTML='';
      for(let i=1;i<=7;i++){
        const dd=new Date(day.time[i]);
        fc.innerHTML+=`<div class="ft"><div class="fd">${DAB[dd.getDay()]}</div><div class="fi">${wIcon(day.weathercode[i],false)}</div><div class="fh">${cF(day.temperature_2m_max[i])}°</div><div class="fl">${cF(day.temperature_2m_min[i])}°</div><div class="fr">${day.precipitation_probability_max[i]??0}%</div></div>`;
      }
      applyWeatherAtmosphere(cur.weathercode);
      document.getElementById('loading').classList.add('fade');
      setTimeout(()=>document.getElementById('loading').style.display='none',800);
    }).catch(()=>{
      document.getElementById('wcd').textContent='UNAVAILABLE';
      document.getElementById('loading').classList.add('fade');
      setTimeout(()=>document.getElementById('loading').style.display='none',800);
    });
}

// Force past loading screen after 5s no matter what
setTimeout(()=>{
  const l=document.getElementById('loading');
  if(l&&!l.classList.contains('fade')){
    l.classList.add('fade');
    setTimeout(()=>l.style.display='none',800);
  }
},5000);

function geoOK(p){
  const{latitude:lat,longitude:lon}=p.coords;
  fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json')
    .then(r=>r.json())
    .then(g=>{
      const city=g.address?.city||g.address?.town||g.address?.village||g.address?.county||'LOCATION';
      const st=g.address?.state_code||g.address?.country_code?.toUpperCase()||'';
      loadWx(lat,lon,city+', '+st);
    }).catch(()=>loadWx(lat,lon,'YOUR LOCATION'));
}
function geoFail(){loadWx(30.2950,-97.7403,'AUSTIN, TX');}
if(navigator.geolocation)navigator.geolocation.getCurrentPosition(geoOK,geoFail,{timeout:6000});
else geoFail();
setInterval(()=>{if(navigator.geolocation)navigator.geolocation.getCurrentPosition(geoOK,geoFail,{timeout:6000});else geoFail();},600000);

// ── WEATHER ATMOSPHERE ─────────────────────────────────────
const SEVERE_CODES = new Set([95,96,99,   // thunderstorm
  55,56,57,65,66,67,               // heavy rain/freezing
  75,76,77,                         // heavy snow
  82]);                              // violent showers

function isSevere(code){ return SEVERE_CODES.has(code); }

function applyWeatherAtmosphere(code){
  // Severe alert: red border on weather panel + today tile
  const wcEl = document.getElementById('wc');
  if(isSevere(code)){
    wcEl.classList.add('severe');
    const tiles = document.querySelectorAll('.ft');
    if(tiles[0]) tiles[0].classList.add('severe');
  } else {
    wcEl.classList.remove('severe');
    document.querySelectorAll('.ft.severe').forEach(t=>t.classList.remove('severe'));
  }
  // Rain canvas
  const isRainy = (code>=51&&code<=67)||(code>=80&&code<=82)||(code>=95&&code<=99);
  if(isRainy) startRain(isSevere(code)?0.28:0.14);
  else stopRain();
  // Sky tint via SVG sky gradient (day/night handled separately)
  updateSkyForWeather(code);
}

// ── DAY/NIGHT SKY ───────────────────────────────────────────
function updateDayNight(){
  const h = new Date().getHours() + new Date().getMinutes()/60;
  // brightness curve: darkest ~2am=0, pre-dawn ~5=0.15, day ~12=0.35, dusk ~19=0.2, night ~22=0.05
  let t;
  if(h<5)       t = 0.0 + (h/5)*0.12;
  else if(h<8)  t = 0.12 + ((h-5)/3)*0.22;
  else if(h<13) t = 0.34 + ((h-8)/5)*0.06;
  else if(h<17) t = 0.40 - ((h-13)/4)*0.10;
  else if(h<20) t = 0.30 - ((h-17)/3)*0.20;
  else if(h<23) t = 0.10 - ((h-20)/3)*0.10;
  else           t = 0.0;
  // Apply as a subtle light overlay on the bg
  const overlay = document.getElementById('daynight-overlay');
  if(overlay) overlay.style.opacity = t;
  // Moon visibility: fade out during day
  const moonEl = document.getElementById('bg-moon');
  if(moonEl) moonEl.style.opacity = h>7&&h<19 ? 0 : 1;
}
setInterval(updateDayNight, 60000);
updateDayNight();

function updateSkyForWeather(code){
  const haze = document.getElementById('weather-haze');
  if(!haze) return;
  if(code>=45&&code<=48){ haze.style.opacity='0.35'; haze.style.background='rgba(180,200,180,0.08)'; }
  else if(code>=51&&code<=99){ haze.style.opacity='0.4'; haze.style.background='rgba(20,30,20,0.18)'; }
  else { haze.style.opacity='0'; }
}

// ── RAIN ────────────────────────────────────────────────────
let rainAnim=null, rainCtx=null;
function startRain(opacity=0.14){
  const canvas=document.getElementById('rain-canvas');
  if(!canvas)return;
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  canvas.style.opacity=opacity;
  rainCtx=canvas.getContext('2d');
  const drops=[];
  const N=28; // sparse — just enough to feel it
  for(let i=0;i<N;i++) drops.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    len:Math.random()*18+10,
    speed:Math.random()*1.2+0.8,
    opacity:Math.random()*0.3+0.1
  });
  if(rainAnim) cancelAnimationFrame(rainAnim);
  function draw(){
    rainCtx.clearRect(0,0,canvas.width,canvas.height);
    drops.forEach(d=>{
      rainCtx.beginPath();
      rainCtx.moveTo(d.x,d.y);
      rainCtx.lineTo(d.x+d.len*0.15,d.y+d.len);
      rainCtx.strokeStyle=`rgba(140,200,160,${d.opacity})`;
      rainCtx.lineWidth=0.5;
      rainCtx.stroke();
      d.y+=d.speed;
      if(d.y>canvas.height){ d.y=-d.len; d.x=Math.random()*canvas.width; }
    });
    rainAnim=requestAnimationFrame(draw);
  }
  draw();
}
function stopRain(){
  if(rainAnim){ cancelAnimationFrame(rainAnim); rainAnim=null; }
  const canvas=document.getElementById('rain-canvas');
  if(canvas){ canvas.style.opacity=0; const ctx=canvas.getContext('2d'); if(ctx)ctx.clearRect(0,0,canvas.width,canvas.height); }
}

// ── LIGHTNING (severe only) ──────────────────────────────────
function startLightning(){
  function flash(){
    const el=document.getElementById('lightning-bg');
    if(!el)return;
    el.style.transition='opacity 0.05s';
    el.style.opacity='0.05';
    setTimeout(()=>{ el.style.transition='opacity 0.4s'; el.style.opacity='0'; },80);
    // occasional double flash
    if(Math.random()>0.6) setTimeout(()=>{
      el.style.transition='opacity 0.05s'; el.style.opacity='0.03';
      setTimeout(()=>{ el.style.transition='opacity 0.5s'; el.style.opacity='0'; },60);
    },150);
    // next flash: 20-60s away
    setTimeout(flash, 20000+Math.random()*40000);
  }
  setTimeout(flash, 5000+Math.random()*15000);
}

async function wake(){try{if('wakeLock'in navigator)await navigator.wakeLock.request('screen');}catch(e){}}
wake();
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')wake();});
</script>
