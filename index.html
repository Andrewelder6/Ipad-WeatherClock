  #app{
    position:relative;z-index:2;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;
    padding:clamp(12px,2vh,30px) clamp(20px,3.5vw,56px) clamp(12px,1.8vh,24px);
  }

  /* ── ROW 1: upcoming forecast — plain text, no tiles ── */
  #forecast-strip{
    display:flex;
    gap:clamp(12px,3vw,40px);
    width:100%;max-width:860px;
    flex-shrink:0;
    padding-bottom:clamp(8px,1.2vh,14px);
    border-bottom:1px solid rgba(255,255,255,0.07);
    justify-content:center;
  }

  .fc-col{
    display:flex;flex-direction:column;align-items:center;
    gap:1px;
  }
  .fc-tri{
    font-size:clamp(8px,1vw,10px);font-weight:300;
    letter-spacing:0.28em;text-transform:uppercase;
    color:var(--dimmer);
  }
  .fc-icon{font-size:clamp(11px,1.5vw,15px);line-height:1.4;}
  .fc-temps{
    font-size:clamp(9px,1.1vw,11px);font-weight:200;
    color:var(--dim);letter-spacing:0.04em;
    white-space:nowrap;
  }
  .fc-temps .hi{color:var(--white);font-weight:300;}
  .fc-rain{
    font-size:clamp(7px,0.85vw,9px);font-weight:300;
    color:var(--teal);letter-spacing:0.06em;
    min-height:10px;
  }

  /* ── ROW 2: clock + current weather ── */
  #middle{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(5px,0.9vh,12px);width:100%;
  }

  #days-row{
    display:flex;gap:clamp(10px,2vw,24px);
    font-size:clamp(10px,1.4vw,12px);font-weight:300;
    letter-spacing:0.32em;text-transform:uppercase;color:var(--dimmer);
  }
  .day-lbl{position:relative;}
  .day-lbl.ad{color:var(--white);}
  .day-lbl.ad::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
    width:3.3px;height:3.3px;border-radius:50%;background:var(--white);
    box-shadow:0 0 5px rgba(255,255,255,0.6);}

  #time-display{
    font-family:'DM Serif Display',serif;
    font-size:clamp(90px,17vw,180px);
    line-height:0.92;letter-spacing:-0.02em;color:var(--white);
    text-shadow:0 4px 80px rgba(0,0,0,0.45);
    display:flex;align-items:baseline;justify-content:center;
  }
  .colon{animation:bc 1s step-end infinite;color:rgba(255,255,255,0.45);
    display:inline-block;width:0.22em;text-align:center;}
  @keyframes bc{0%,100%{opacity:1}50%{opacity:0.07}}
  #ampm{font-family:'Inter',sans-serif;font-weight:200;
    font-size:clamp(14px,2.2vw,24px);letter-spacing:0.18em;
    color:var(--dim);align-self:flex-start;margin-top:0.2em;margin-left:6px;}

  #date-row{font-family:'Inter',sans-serif;font-weight:200;
    font-size:clamp(12px,1.6vw,16px);letter-spacing:0.24em;
    color:var(--dim);text-transform:uppercase;}

  /* current weather */
  #wc{display:flex;align-items:center;gap:clamp(14px,2.2vw,28px);margin-top:clamp(2px,0.4vh,8px);}
  #wi{font-size:clamp(36px,5vw,54px);filter:drop-shadow(0 2px 12px rgba(0,0,0,0.55));line-height:1;}
  #cur-temp{
    font-family:'DM Serif Display',serif;
    font-size:clamp(48px,7.5vw,82px);line-height:1;color:var(--white);
    text-shadow:0 2px 32px rgba(0,0,0,0.5);
  }
  #cur-temp sup{font-family:'Inter',sans-serif;font-weight:200;font-size:0.26em;
    vertical-align:top;margin-top:0.3em;color:var(--dim);}
  #wdetail{
    display:flex;flex-direction:column;gap:5px;
    padding-left:clamp(14px,1.8vw,22px);
    border-left:1px solid rgba(255,255,255,0.22);
  }
  #wcd{font-size:clamp(13px,1.7vw,17px);font-weight:300;letter-spacing:0.14em;
    color:var(--white);text-transform:uppercase;}
  #whl{font-size:clamp(10px,1.3vw,13px);font-weight:200;letter-spacing:0.1em;
    color:var(--dim);text-transform:uppercase;}
  #whl .v{color:var(--white);font-weight:300;}
  #whl .rv{color:var(--teal);}
  #wloc{font-size:clamp(9px,1vw,11px);font-weight:200;letter-spacing:0.18em;
    color:rgba(255,255,255,0.25);text-transform:uppercase;}

  #quote{font-family:'DM Serif Display',serif;font-style:italic;
    font-size:clamp(14px,1.9vw,21px);color:rgba(255,255,255,0.65);
    text-shadow:0 2px 18px rgba(0,0,0,0.5);margin-top:clamp(2px,0.3vh,6px);}

  /* ── ROW 3: Austin FC plain text ── */
  #atx-section{
    flex-shrink:0;width:100%;max-width:860px;
    display:flex;align-items:center;justify-content:center;
    gap:clamp(20px,4vw,56px);
    padding-top:clamp(10px,1.5vh,18px);
    border-top:1px solid rgba(255,255,255,0.07);
  }
  .atx-col{display:flex;flex-direction:column;align-items:center;gap:2px;text-align:center;}
  .atx-label{font-size:clamp(7px,0.9vw,9px);font-weight:300;letter-spacing:0.36em;
    text-transform:uppercase;color:rgba(0,196,74,0.6);margin-bottom:1px;}
  .atx-value{font-family:'DM Serif Display',serif;
    font-size:clamp(16px,2.3vw,24px);color:var(--white);line-height:1;
    text-shadow:0 2px 14px rgba(0,0,0,0.5);}
  .atx-sub{font-size:clamp(8px,0.95vw,10px);font-weight:200;
    letter-spacing:0.16em;color:var(--dimmer);text-transform:uppercase;margin-top:2px;}
  .atx-div{width:1px;height:clamp(28px,4vh,42px);background:rgba(0,196,74,0.18);flex-shrink:0;}
  .next-ha{display:inline-block;font-size:clamp(6px,0.75vw,8px);font-weight:400;
    letter-spacing:0.2em;text-transform:uppercase;padding:1px 6px;border-radius:2px;
    background:rgba(0,196,74,0.18);color:var(--verde);margin-right:6px;vertical-align:middle;}
  .next-ha.away{background:rgba(255,255,255,0.07);color:var(--dimmer);}

  #loading{position:fixed;inset:0;z-index:50;background:#0a1e20;
    display:flex;align-items:center;justify-content:center;transition:opacity 0.8s;}
  #loading.fade{opacity:0;pointer-events:none;}
  #ltxt{font-size:10px;font-weight:300;letter-spacing:0.4em;
    color:rgba(77,217,200,0.4);text-transform:uppercase;
    animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:0.15}50%{opacity:1}}
</style>
</head>
<body>
<div id="loading"><div id="ltxt">Loading...</div></div>
<div id="wall"></div>
<div id="grain"></div>

<div id="app">

  <!-- ROW 1: upcoming 6 days, no today, no tiles -->
  <div id="forecast-strip"></div>

  <!-- ROW 2: clock + weather -->
  <div id="middle">
    <div id="days-row">
      <span class="day-lbl" id="d-mon">MON</span>
      <span class="day-lbl" id="d-tue">TUE</span>
      <span class="day-lbl" id="d-wed">WED</span>
      <span class="day-lbl" id="d-thu">THU</span>
      <span class="day-lbl" id="d-fri">FRI</span>
      <span class="day-lbl" id="d-sat">SAT</span>
      <span class="day-lbl" id="d-sun">SUN</span>
    </div>

    <div id="time-display">
      <span id="th">--</span><span class="colon">:</span><span id="tm2">--</span><span id="ampm">AM</span>
    </div>

    <div id="date-row"></div>

    <div id="wc">
      <div id="wi">🌤</div>
      <div id="cur-temp">--<sup>°F</sup></div>
      <div id="wdetail">
        <div id="wcd">Austin, TX</div>
        <div id="whl">H&nbsp;<span class="v" id="wh">--°</span>&nbsp;·&nbsp;L&nbsp;<span class="v" id="wl">--°</span>&nbsp;·&nbsp;Rain&nbsp;<span class="rv" id="wr">--%</span></div>
        <div id="wloc">Open-Meteo</div>
      </div>
    </div>

    <div id="quote">Have a big day.</div>
  </div>

  <!-- ROW 3: Austin FC -->
  <div id="atx-section">
    <div class="atx-col">
      <div class="atx-label">Austin FC · MLS 2026</div>
      <div class="atx-value">Western Conference</div>
    </div>
    <div class="atx-div"></div>
    <div class="atx-col">
      <div class="atx-label">Standing</div>
      <div class="atx-value" id="atx-rank">11th</div>
      <div class="atx-sub" id="atx-pts">4 pts</div>
    </div>
    <div class="atx-div"></div>
    <div class="atx-col">
      <div class="atx-label">Record</div>
      <div class="atx-value" id="atx-record">1 · 2 · 1</div>
      <div class="atx-sub">W · L · D</div>
    </div>
    <div class="atx-div"></div>
    <div class="atx-col">
      <div class="atx-label">Next Match</div>
      <div class="atx-value"><span id="atx-next-ha" class="next-ha">HOME</span><span id="atx-next-team">vs LAFC</span></div>
      <div class="atx-sub" id="atx-next-time">Mar 21 · 7:45 PM CDT</div>
    </div>
  </div>

</div>

<script>
const DAYS_IDS=[['d-sun',0],['d-mon',1],['d-tue',2],['d-wed',3],['d-thu',4],['d-fri',5],['d-sat',6]];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAB=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const pad=n=>String(n).padStart(2,'0');

function tick(){
  const n=new Date();
  let h=n.getHours();const ap=h>=12?'PM':'AM';h=h%12||12;
  document.getElementById('th').textContent=pad(h);
  document.getElementById('tm2').textContent=pad(n.getMinutes());
  document.getElementById('ampm').textContent=ap;
  document.getElementById('date-row').textContent=n.getDate()+' '+MONTHS[n.getMonth()]+' '+n.getFullYear();
  const dow=n.getDay();
  DAYS_IDS.forEach(([id,i])=>document.getElementById(id).classList.toggle('ad',i===dow));
}
setInterval(tick,1000);tick();

// Render placeholder forecast immediately (days 1-6, skipping today)
function renderForecastPlaceholders(){
  const now=new Date();
  const strip=document.getElementById('forecast-strip');
  strip.innerHTML='';
  for(let i=1;i<=6;i++){
    const d=new Date(now);d.setDate(d.getDate()+i);
    const tri=DAB[d.getDay()].toUpperCase();
    strip.innerHTML+=
      '<div class="fc-col">'+
        '<div class="fc-tri">'+tri+'</div>'+
        '<div class="fc-icon">·</div>'+
        '<div class="fc-temps"><span class="hi">--°</span> / --°</div>'+
        '<div class="fc-rain">&nbsp;</div>'+
      '</div>';
  }
}
renderForecastPlaceholders();

const cF=c=>Math.round(c*9/5+32);
function wIcon(c,night){
  if(c===0)return night?'🌙':'☀️';if(c<=2)return night?'🌛':'🌤';
  if(c<=3)return'☁️';if(c<=49)return'🌫';if(c<=67)return'🌧';
  if(c<=77)return'❄️';if(c<=82)return'🌦';if(c<=86)return'🌨';return'⛈';
}
function wLbl(c){
  if(c===0)return'Clear';if(c<=2)return'Partly Cloudy';if(c<=3)return'Overcast';
  if(c<=49)return'Foggy';if(c<=57)return'Drizzle';if(c<=67)return'Rain';
  if(c<=77)return'Snow';if(c<=82)return'Showers';if(c<=86)return'Snow Shwrs';return'Storm';
}

function loadWx(){
  fetch('https://api.open-meteo.com/v1/forecast?latitude=30.2950&longitude=-97.7403&current=temperature_2m,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=celsius&forecast_days=8&timezone=America%2FChicago')
    .then(r=>{if(!r.ok)throw new Error('wx');return r.json();})
    .then(d=>{
      const cur=d.current,day=d.daily;
      const h=new Date().getHours();const night=h<6||h>=20;

      // Today
      document.getElementById('cur-temp').innerHTML=cF(cur.temperature_2m)+'<sup>°F</sup>';
      document.getElementById('wi').textContent=wIcon(cur.weathercode,night);
      document.getElementById('wcd').textContent=wLbl(cur.weathercode);
      document.getElementById('wh').textContent=cF(day.temperature_2m_max[0])+'°';
      document.getElementById('wl').textContent=cF(day.temperature_2m_min[0])+'°';
      document.getElementById('wr').textContent=(day.precipitation_probability_max[0]??0)+'%';
      document.getElementById('wloc').textContent='Austin, TX';

      // Upcoming 6 days (index 1-6, skip today at 0)
      const strip=document.getElementById('forecast-strip');
      strip.innerHTML='';
      for(let i=1;i<=6;i++){
        const parts=day.time[i].split('-');
        const dt=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
        const tri=DAB[dt.getDay()].toUpperCase();
        const rain=day.precipitation_probability_max[i]??0;
        const rainHtml=rain>20?'<div class="fc-rain">'+rain+'% rain</div>':'<div class="fc-rain">&nbsp;</div>';
        strip.innerHTML+=
          '<div class="fc-col">'+
            '<div class="fc-tri">'+tri+'</div>'+
            '<div class="fc-icon">'+wIcon(day.weathercode[i],false)+'</div>'+
            '<div class="fc-temps"><span class="hi">'+cF(day.temperature_2m_max[i])+'°</span> / '+cF(day.temperature_2m_min[i])+'°</div>'+
            rainHtml+
          '</div>';
      }
    })
    .catch(err=>console.warn('Weather fetch failed:',err));
}
loadWx();setInterval(loadWx,600000);

// Austin FC
const ATX_FB={rank:'11th',pts:'4',record:'1 · 2 · 1',nextOpp:'LAFC',nextHa:'HOME',nextTime:'Mar 21 · 7:45 PM CDT'};
function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
function short(n){
  const m={'Los Angeles FC':'LAFC','Los Angeles Galaxy':'LA Galaxy','Inter Miami CF':'Inter Miami',
    'New York City FC':'NYCFC','New York Red Bulls':'NY Red Bulls','San Jose Earthquakes':'San Jose',
    'Vancouver Whitecaps FC':'Vancouver','Portland Timbers':'Portland','Colorado Rapids':'Colorado',
    'Houston Dynamo':'Houston','Minnesota United FC':'Minnesota','Seattle Sounders':'Seattle',
    'Nashville SC':'Nashville','San Diego FC':'San Diego','Sporting Kansas City':'Sporting KC',
    'Saint Louis City SC':'St. Louis','CF Montreal':'Montreal','Columbus Crew':'Columbus',
    'Orlando City SC':'Orlando','Atlanta United FC':'Atlanta','Philadelphia Union':'Philadelphia',
    'FC Cincinnati':'Cincinnati','New England Revolution':'New England','DC United':'DC United',
    'Charlotte FC':'Charlotte','Chicago Fire':'Chicago','Toronto FC':'Toronto','FC Dallas':'FC Dallas',
    'Real Salt Lake':'Real Salt Lake'};
  return m[n]||n;
}
async function loadMLS(){
  try{
    const r=await fetch('https://sports.claude.ai/api/mls/scores?team=Austin+FC');
    if(!r.ok)throw new Error();
    const data=await r.json();
    const sr=await fetch('https://sports.claude.ai/api/mls/standings');
    const sd=await sr.json();
    const atx=(sd.standings||[]).find(s=>s.team.abbreviation==='ATX');
    const next=(data.games||[]).filter(g=>g.status==='scheduled'&&new Date(g.start_time)>new Date())[0];
    if(atx){
      document.getElementById('atx-rank').textContent=ordinal(atx.rank);
      document.getElementById('atx-pts').textContent=atx.points+' pts';
      document.getElementById('atx-record').textContent=atx.wins+' · '+atx.losses+' · '+atx.draws;
    }
    if(next){
      const isHome=next.home==='ATX';
      const opp=isHome?next.teams[next.away].name:next.teams[next.home].name;
      const ha=document.getElementById('atx-next-ha');
      ha.textContent=isHome?'HOME':'AWAY';ha.className='next-ha'+(isHome?'':' away');
      document.getElementById('atx-next-team').textContent='vs '+short(opp);
      document.getElementById('atx-next-time').textContent=next.local_start.replace(/^\S+\s/,'');
    }
  }catch(e){/* keep fallback */}
}
loadMLS().finally(()=>{
  document.getElementById('loading').classList.add('fade');
  setTimeout(()=>document.getElementById('loading').style.display='none',900);
});
setInterval(loadMLS,300000);

async function wake(){try{if('wakeLock'in navigator)await navigator.wakeLock.request('screen');}catch(e){}}
wake();
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')wake();});
</script>
</body>
</html>
